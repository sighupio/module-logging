auth_enabled: false
bloom_build:
  builder:
    planner_address: loki-distributed-bloom-planner-headless.logging.svc.cluster.local:9095
  enabled: false
bloom_gateway:
  client:
    addresses: dnssrvnoa+_grpc._tcp.loki-distributed-bloom-gateway-headless.logging.svc.cluster.local
  enabled: false
common:
  compactor_grpc_address: 'loki-distributed-compactor.logging.svc.cluster.local:9095'
  path_prefix: /var/loki
  replication_factor: 1
  storage:
    s3:
      access_key_id: ${MINIO_ACCESS_KEY:-minio}
      bucketnames: loki
      endpoint: http://minio-logging.logging.svc.cluster.local:9000
      insecure: true
      s3forcepathstyle: true
      secret_access_key: ${MINIO_SECRET_KEY:-minio123}
compactor:
  delete_request_store: s3
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  retention_enabled: true
  working_directory: /var/loki/compactor
distributor:
  ring:
    kvstore:
      store: memberlist
frontend:
  compress_responses: true
  log_queries_longer_than: 5s
  scheduler_address: loki-distributed-query-scheduler-headless.logging.svc.cluster.local:9095
  tail_proxy_url: http://loki-distributed-querier.logging.svc.cluster.local:3100
frontend_worker:
  scheduler_address: loki-distributed-query-scheduler-headless.logging.svc.cluster.local:9095
index_gateway:
  mode: simple
ingester:
  chunk_block_size: 262144
  chunk_encoding: snappy
  chunk_idle_period: 30m
  chunk_retain_period: 1m
  lifecycler:
    ring:
      kvstore:
        store: memberlist
      replication_factor: 1
  wal:
    flush_on_shutdown: true
limits_config:
  allow_structured_metadata: true
  discover_log_levels: true
  max_cache_freshness_per_query: 10m
  max_label_names_per_series: 30
  query_timeout: 300s
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  retention_period: 720h
  split_queries_by_interval: 15m
  volume_enabled: true
memberlist:
  abort_if_cluster_join_fails: true
  advertise_port: 7946
  bind_port: 7946
  join_members:
  - loki-distributed-memberlist.logging.svc.cluster.local
  max_join_backoff: 1m
  max_join_retries: 10
  min_join_backoff: 1s
  rejoin_interval: 90s
pattern_ingester:
  enabled: true
querier:
  max_concurrent: 4
query_range:
  align_queries_with_step: true
  cache_results: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        ttl: 24h
runtime_config:
  file: /etc/loki/runtime-config/runtime-config.yaml
schema_config:
  configs:
  - from: "2020-10-24"
    index:
      period: 24h
      prefix: index_
    object_store: s3
    schema: v11
    store: boltdb-shipper
  - from: "2024-12-01"
    index:
      period: 24h
      prefix: index_
    object_store: s3
    schema: v13
    store: tsdb
server:
  graceful_shutdown_timeout: 5s
  grpc_listen_port: 9095
  grpc_server_max_concurrent_streams: 1000
  grpc_server_max_recv_msg_size: 104857600
  grpc_server_max_send_msg_size: 104857600
  grpc_server_min_time_between_pings: 10s
  grpc_server_ping_without_stream_allowed: true
  http_listen_port: 3100
  http_server_idle_timeout: 30s
  http_server_read_timeout: 10m0s
  http_server_write_timeout: 10m0s
  log_level: info
storage_config:
  bloom_shipper:
    working_directory: /var/loki/data/bloomshipper
  boltdb_shipper:
    active_index_directory: /var/loki/index
    cache_location: /var/loki/cache
    cache_ttl: 24h
    index_gateway_client:
      server_address: dns+loki-distributed-index-gateway-headless.logging.svc.cluster.local:9095
    resync_interval: 5s
  hedging:
    at: 250ms
    max_per_second: 20
    up_to: 3
  tsdb_shipper:
    active_index_directory: /var/loki/index
    cache_location: /var/loki/cache
    cache_ttl: 24h
    index_gateway_client:
      server_address: dns+loki-distributed-index-gateway-headless.logging.svc.cluster.local:9095
    resync_interval: 5s
  use_thanos_objstore: false
tracing:
  enabled: false