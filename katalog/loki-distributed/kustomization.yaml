---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: logging
resources:
  - datasource
  - deploy.yaml
  - dashboards
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: loki
    files:
      - configs/config.yaml
  - name: minio-credentials-loki
    envs:
      - minio-credentials.env
configMapGenerator:
  - name: loki-distributed-gateway
    files:
      - configs/nginx.conf
      - configs/access-log-exporter.yaml
