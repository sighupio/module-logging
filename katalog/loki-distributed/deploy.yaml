# Source: loki/templates/distributor/workload.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "loki-distributed-distributor"
  namespace: "logging"
  labels:
    helm.sh/chart: loki-17.4.7
    app.kubernetes.io/name: loki-distributed
    app.kubernetes.io/instance: loki-distributed
    app.kubernetes.io/version: "3.7.2"
    app.kubernetes.io/component: distributor
spec:
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: loki-distributed
      app.kubernetes.io/instance: loki-distributed
      app.kubernetes.io/component: distributor
  template:
    metadata:
      annotations:
        checksum/config: abadb566f40bf0911ed91ceddf864469ee438f2ae8855eeb1f43c4aa840d7398
        kubectl.kubernetes.io/default-container: "distributor"
      labels:
        helm.sh/chart: loki-17.4.7
        app.kubernetes.io/name: loki-distributed
        app.kubernetes.io/instance: loki-distributed
        app.kubernetes.io/version: "3.7.2"
        app.kubernetes.io/component: distributor
        app.kubernetes.io/part-of: memberlist
    spec:
      serviceAccountName: loki-distributed
      enableServiceLinks: true
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: distributor
                  app.kubernetes.io/instance: 'loki-distributed'
                  app.kubernetes.io/name: 'loki-distributed'
              topologyKey: kubernetes.io/hostname
      volumes:
        - name: temp
          emptyDir: {}
        - name: config
          secret:
            secretName: loki
        - name: runtime-config
          configMap:
            name: loki-distributed-runtime
        - name: data
          emptyDir: {}
      containers:
        - name: distributor
          image: registry.sighup.io/fury/grafana/loki:3.7.2
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/loki/config/config.yaml
            - -config.expand-env=true
            - -memberlist.advertise-addr=$(POD_IP)
            - -target=distributor
            - -config.expand-env=true
          ports:
            - name: http-metrics
              containerPort: 3100
              protocol: TCP
            - name: grpc
              containerPort: 9095
              protocol: TCP
            - name: http-memberlist
              containerPort: 7946
              protocol: TCP
          env:
            - name: GOMEMLIMIT
              value: 870MiB
            - name: GOGC
              value: "80"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          envFrom:
            - secretRef:
                name: minio-credentials-loki
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            failureThreshold: 10
            httpGet:
              path: /loki/api/v1/status/buildinfo
              port: http-metrics
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          volumeMounts:
            - name: config
              mountPath: /etc/loki/config
            - name: runtime-config
              mountPath: /etc/loki/runtime-config
            - name: data
              mountPath: /var/loki
            - name: temp
              mountPath: /tmp
          resources:
            limits:
              cpu: 500m
              memory: 1024Mi
            requests:
              cpu: 100m
              memory: 128Mi
