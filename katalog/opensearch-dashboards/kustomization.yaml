apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: logging
resources:
- deploy.yaml
- index-patterns-cronjob.yml
images:
- name: registry.sighup.io/fury/opensearchproject/opensearch-dashboards
  newTag: 3.7.0
- name: registry.sighup.io/fury/alpine
  newTag: "3.24"
secretGenerator:
- files:
  - configs/opensearch_dashboards.yml
  name: opensearch-dashboards
configMapGenerator:
- files:
  - configs/index-patterns.json
  name: opensearch-index-patterns
